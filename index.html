<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>午饭吃什么转盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    h1 {
      color: #fff;
      font-size: 2em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      flex: 1;
      min-width: 280px;
      max-width: 360px;
      width: 340px;
    }

    .panel h2 {
      font-size: 1.2em;
      margin-bottom: 16px;
      color: #555;
      border-bottom: 2px solid #667eea;
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel h2 .hint {
      font-weight: normal;
      color: #999;
      font-size: 0.7em;
    }

    .shop-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .shop-actions button {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 0.85em;
      transition: all 0.2s;
    }

    .shop-actions button:hover {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .shop-list {
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .shop-item:hover { background: #f0f0ff; }

    .shop-item input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: #667eea; cursor: pointer;
    }

    .shop-item label { cursor: pointer; font-size: 0.95em; flex: 1; }

    .shop-item .count {
      background: #667eea; color: #fff;
      border-radius: 10px; padding: 2px 8px; font-size: 0.75em;
    }

    .menu-preview {
      max-height: 180px; overflow-y: auto;
      border: 1px solid #eee; border-radius: 8px;
      padding: 10px; font-size: 0.85em; color: #666; line-height: 1.8;
    }

    .menu-preview .tag {
      display: inline-block; background: #eef; color: #667eea;
      padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.9em;
    }

    .menu-preview .tag .price {
      color: #ff4757; font-weight: bold; margin-left: 2px;
    }

    /* 编辑菜单按钮 */
    .edit-menu-btn {
      padding: 3px 10px; border: 1px solid #667eea; border-radius: 6px;
      background: transparent; color: #667eea; cursor: pointer;
      font-size: 0.75em; transition: all 0.2s;
    }
    .edit-menu-btn:hover { background: #667eea; color: #fff; }

    /* 转盘区域 */
    .wheel-section { display: flex; flex-direction: column; align-items: center; }

    .mode-toggle {
      display: inline-flex; gap: 4px; margin-bottom: 30px;
      background: rgba(255,255,255,0.25); padding: 4px; border-radius: 10px;
    }
    .mode-btn {
      padding: 6px 18px; border: none; border-radius: 7px; cursor: pointer;
      background: transparent; color: #fff; font-size: 0.95em; font-weight: bold;
      transition: all 0.2s; opacity: 0.8;
    }
    .mode-btn.active { background: #fff; color: #667eea; opacity: 1; }
    .mode-btn:hover:not(.active) { opacity: 1; }

    .wheel-wrapper { position: relative; width: 420px; height: 420px; }

    canvas {
      width: 420px; height: 420px;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
    }

    .pointer {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 16px solid transparent; border-right: 16px solid transparent;
      border-top: 30px solid #ff4757;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); z-index: 10;
    }

    .pointer::after {
      content: ''; position: absolute; top: -34px; left: -8px;
      width: 16px; height: 16px; background: #ff4757; border-radius: 50%;
    }

    .center-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      color: #fff; font-size: 1.1em; font-weight: bold;
      border: 4px solid #fff; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,71,87,0.5);
      z-index: 10; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 2px;
    }

    .center-btn:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 6px 20px rgba(255,71,87,0.6); }
    .center-btn:active { transform: translate(-50%, -50%) scale(0.95); }
    .center-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

    .result { margin-top: 20px; min-height: 50px; text-align: center; }

    .result-text {
      font-size: 1.4em; color: #fff; font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3); animation: none;
    }

    .result-price { font-size: 1em; color: #ffe066; margin-top: 4px; }

    .result-text.show { animation: popIn 0.5s ease-out; }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 历史记录 */
    .history-list { max-height: 500px; overflow-y: auto; }

    .history-item {
      display: flex; align-items: center; padding: 10px;
      border-bottom: 1px solid #f0f0f0; gap: 8px;
    }

    .history-item:last-child { border-bottom: none; }

    .history-num {
      background: #667eea; color: #fff; width: 28px; height: 28px;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 0.8em; flex-shrink: 0;
    }

    .history-info { flex: 1; min-width: 0; }

    .history-dish { font-weight: 500; font-size: 0.95em; }

    .history-time {
      font-size: 0.7em; color: #bbb; margin-top: 2px;
    }

    .history-price {
      color: #ff4757; font-weight: bold; font-size: 0.9em; white-space: nowrap;
    }

    .history-shop { font-size: 0.8em; color: #999; white-space: nowrap; }

    .hist-badge {
      display: inline-block; font-size: 0.7em; font-weight: bold;
      padding: 1px 6px; border-radius: 4px; margin-right: 6px;
      vertical-align: middle;
    }
    .hist-badge.dish { background: #eef; color: #667eea; }
    .hist-badge.shop { background: #e6f9ec; color: #2bb673; }

    .clear-btn {
      margin-top: 12px; width: 100%; padding: 8px;
      border: 1px dashed #ccc; border-radius: 8px;
      background: transparent; color: #999; cursor: pointer; transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #ff4757; color: #ff4757; }

    .empty { color: #ccc; text-align: center; padding: 40px 0; font-style: italic; }
    .loading { color: #999; text-align: center; padding: 20px; }

    /* 弹窗 */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 100;
      justify-content: center; align-items: center; padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff; border-radius: 16px; padding: 28px;
      width: 100%; max-width: 600px; max-height: 85vh;
      display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .modal h2 {
      font-size: 1.3em; margin-bottom: 16px; color: #333;
      display: flex; justify-content: space-between; align-items: center;
    }

    .modal-close {
      background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999;
    }
    .modal-close:hover { color: #333; }

    .modal-body { flex: 1; overflow-y: auto; }

    /* 编辑器中的店铺块 */
    .editor-shop {
      border: 1px solid #eee; border-radius: 10px; padding: 14px; margin-bottom: 12px;
    }

    .editor-shop-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }

    .editor-shop-header input[type="text"] {
      flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95em; font-weight: bold;
    }

    .editor-shop-header .del-shop-btn {
      padding: 4px 10px; border: 1px solid #ff4757; border-radius: 6px;
      background: transparent; color: #ff4757; cursor: pointer; font-size: 0.8em;
    }
    .editor-shop-header .del-shop-btn:hover { background: #ff4757; color: #fff; }

    .editor-items { display: flex; flex-direction: column; gap: 6px; }

    .editor-item {
      display: flex; gap: 6px; align-items: center;
    }

    .editor-item input[type="text"] {
      flex: 1; padding: 5px 8px; border: 1px solid #eee; border-radius: 4px; font-size: 0.9em;
    }

    .editor-item input[type="number"] {
      width: 70px; padding: 5px 8px; border: 1px solid #eee; border-radius: 4px;
      font-size: 0.9em; text-align: center;
    }

    .editor-item .del-item-btn {
      padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px;
      background: transparent; color: #999; cursor: pointer; font-size: 0.8em;
    }
    .editor-item .del-item-btn:hover { border-color: #ff4757; color: #ff4757; }

    /* 排序按钮 */
    .sort-btn {
      padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;
      background: transparent; color: #999; cursor: pointer; font-size: 0.8em;
      line-height: 1; flex-shrink: 0;
    }
    .sort-btn:hover:not(:disabled) { border-color: #667eea; color: #667eea; }
    .sort-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .add-item-btn {
      margin-top: 6px; padding: 4px 0; border: 1px dashed #ccc; border-radius: 4px;
      background: transparent; color: #999; cursor: pointer; font-size: 0.85em; width: 100%;
    }
    .add-item-btn:hover { border-color: #667eea; color: #667eea; }

    .add-shop-btn {
      width: 100%; padding: 10px; border: 2px dashed #667eea; border-radius: 10px;
      background: transparent; color: #667eea; cursor: pointer;
      font-size: 1em; font-weight: bold; transition: all 0.2s;
    }
    .add-shop-btn:hover { background: #667eea; color: #fff; }

    .modal-footer {
      margin-top: 16px; display: flex; gap: 10px;
    }

    .modal-footer button {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 1em;
      cursor: pointer; font-weight: bold; border: none; transition: all 0.2s;
    }

    .btn-save { background: #667eea; color: #fff; }
    .btn-save:hover { background: #5a6fd6; }

    .btn-reset {
      background: transparent; border: 1px solid #ddd !important; color: #999;
    }
    .btn-reset:hover { border-color: #ff4757 !important; color: #ff4757; }

    /* 响应式 */
    @media (max-width: 900px) {
      body { padding: 12px; }
      h1 { font-size: 1.5em; margin-bottom: 12px; }
      .container { flex-direction: column; align-items: center; gap: 16px; }
      .panel { width: 100%; max-width: 100%; min-width: auto; padding: 16px; }
      .wheel-section { margin-top: 10px; }
      .wheel-wrapper { width: 320px; height: 320px; }
      canvas { width: 320px; height: 320px; }
      .center-btn { width: 64px; height: 64px; font-size: 0.95em; }
      .modal { padding: 20px; max-height: 90vh; }
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      h1 { font-size: 1.3em; margin-bottom: 10px; }
      .container { gap: 12px; }
      .panel { padding: 12px; }
      .panel h2 { font-size: 1em; }
      .wheel-section { margin-top: 14px; }
      .wheel-wrapper { width: 280px; height: 280px; }
      canvas { width: 280px; height: 280px; }
      .center-btn { width: 56px; height: 56px; font-size: 0.85em; }
      .result-text { font-size: 1.1em; }
      .editor-shop-header { flex-wrap: wrap; }
      .editor-shop-header input[type="text"] { min-width: 0; flex-basis: 100%; order: 1; }
      .editor-shop-header .sort-btn { order: 2; }
      .editor-shop-header .del-shop-btn { order: 3; }
      .editor-item { flex-wrap: wrap; }
      .editor-item input[type="text"] { min-width: 0; flex-basis: 100%; order: 1; }
      .editor-item input[type="number"] { flex-shrink: 0; width: 55px; order: 2; }
      .editor-item .sort-btn { order: 3; }
      .editor-item .del-item-btn { order: 4; }
      .modal { padding: 14px; max-height: 95vh; }
    }

    /* JS 强制移动端样式（兜底转发/iframe场景） */
    body.mobile-mode { padding: 8px !important; }
    body.mobile-mode h1 { font-size: 1.3em !important; margin-bottom: 10px !important; }
    body.mobile-mode .container { flex-direction: column !important; align-items: center !important; gap: 12px !important; }
    body.mobile-mode .panel { width: 100% !important; max-width: 100% !important; min-width: auto !important; padding: 12px !important; }
    body.mobile-mode .panel h2 { font-size: 1em !important; }
    body.mobile-mode .wheel-section { margin-top: 14px !important; }
    body.mobile-mode .wheel-wrapper { width: 280px !important; height: 280px !important; }
    body.mobile-mode canvas { width: 280px !important; height: 280px !important; }
    body.mobile-mode .center-btn { width: 56px !important; height: 56px !important; font-size: 0.85em !important; }
    body.mobile-mode .result-text { font-size: 1.1em !important; }
    body.mobile-mode .modal { padding: 14px !important; max-height: 95vh !important; }
    body.mobile-mode .editor-shop-header { flex-wrap: wrap !important; }
    body.mobile-mode .editor-shop-header input[type="text"] { min-width: 0 !important; flex-basis: 100% !important; order: 1 !important; }
    body.mobile-mode .editor-shop-header .sort-btn { order: 2 !important; }
    body.mobile-mode .editor-shop-header .del-shop-btn { order: 3 !important; }
    body.mobile-mode .editor-item { flex-wrap: wrap !important; }
    body.mobile-mode .editor-item input[type="text"] { min-width: 0 !important; flex-basis: 100% !important; order: 1 !important; }
    body.mobile-mode .editor-item input[type="number"] { flex-shrink: 0 !important; width: 55px !important; order: 2 !important; }
    body.mobile-mode .editor-item .sort-btn { order: 3 !important; }
    body.mobile-mode .editor-item .del-item-btn { order: 4 !important; }
  </style>
  <script>
    // 强制检测屏幕宽度，转发/iframe/frameset场景下CSS媒体查询可能失效
    (function() {
      function checkMobile() {
        // 优先用screen.width（设备物理屏幕），frameset/iframe中window.innerWidth不准
        var w = screen.width || window.innerWidth || document.documentElement.clientWidth;
        if (w <= 480) {
          document.body.classList.add('mobile-mode');
        } else {
          document.body.classList.remove('mobile-mode');
        }
      }
      function init() {
        checkMobile();
        window.addEventListener('resize', checkMobile);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</head>
<body>
  <h1>今天吃什么？</h1>

  <div class="container">
    <!-- 左侧: 店铺选择 -->
    <div class="panel">
      <h2>
        选择店铺
        <button class="edit-menu-btn" onclick="openEditor()">编辑菜单</button>
      </h2>
      <div class="shop-actions">
        <button onclick="selectAll()">全选</button>
        <button onclick="selectNone()">全不选</button>
      </div>
      <div class="shop-list" id="shopList">
        <div class="loading">加载菜单中...</div>
      </div>

      <h2 style="margin-top: 20px;">当前菜单 <span id="menuCount" style="font-weight:normal;color:#999;font-size:0.85em;"></span></h2>
      <div class="menu-preview" id="menuPreview">
        <div class="empty">请至少选择一个店铺</div>
      </div>
    </div>

    <!-- 中间: 转盘 -->
    <div class="wheel-section">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeDishBtn" onclick="setSpinMode('dish')">转菜品</button>
        <button class="mode-btn" id="modeShopBtn" onclick="setSpinMode('shop')">转店铺</button>
      </div>
      <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="840" height="840"></canvas>
        <div class="pointer"></div>
        <button class="center-btn" id="spinBtn" onclick="spin()" disabled>开始</button>
      </div>
      <div class="result">
        <div class="result-text" id="resultText"></div>
        <div class="result-price" id="resultPrice"></div>
      </div>
    </div>

    <!-- 右侧: 历史记录 -->
    <div class="panel">
      <h2>抽签记录</h2>
      <div class="history-list" id="historyList">
        <div class="empty">还没有记录，快来试试吧！</div>
      </div>
      <button class="clear-btn" onclick="clearHistory()">清空记录</button>
    </div>
  </div>

  <!-- 编辑菜单弹窗 -->
  <div class="modal-overlay" id="editorModal">
    <div class="modal">
      <h2>
        编辑菜单
        <button class="modal-close" onclick="closeEditor()">&times;</button>
      </h2>
      <div class="modal-body" id="editorBody"></div>
      <button class="add-shop-btn" onclick="editorAddShop()">+ 添加店铺</button>
      <div class="modal-footer">
        <button class="btn-reset" onclick="editorReset()">恢复默认</button>
        <button class="btn-save" onclick="editorSave()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ============ 工具函数 ============
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // 校验菜单结构并去重店铺名（selectedShops 用名字当 key，重名会导致勾选串台）
    function normalizeMenu(data) {
      if (!Array.isArray(data)) return [];
      const seen = new Set();
      return data
        .filter(s => s && typeof s.name === 'string' && Array.isArray(s.items))
        .map(s => {
          let name = s.name.trim();
          if (!name) return null;
          // 同名店铺加后缀，避免 selectedShops 串台
          let base = name, k = 2;
          while (seen.has(name)) { name = `${base}(${k})`; k++; }
          seen.add(name);
          const items = s.items
            .filter(it => it && typeof it.name === 'string' && it.name.trim())
            .map(it => ({ name: it.name.trim(), price: Math.max(0, Number(it.price) || 0) }));
          return { name, items };
        })
        .filter(Boolean)
        .filter(s => s.items.length > 0);
    }

    // ============ 数据 ============
    const STORAGE_KEY_MENU = 'lunch_wheel_menu';
    const STORAGE_KEY_HISTORY = 'lunch_wheel_history';

    let shopData = [];
    let selectedShops = [];
    let currentItems = [];
    let history = [];
    let isSpinning = false;
    let currentAngle = 0;
    let spinMode = 'dish';      // 'dish' | 'shop'
    let wheelEntries = [];      // 当前转盘条目：{ label, sub, price, type, shop, dish }

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    const COLORS = [
      '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
      '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
      '#F8C471', '#82E0AA', '#F1948A', '#AED6F1', '#D5DBDB',
      '#A3E4D7', '#FAD7A0', '#D2B4DE', '#A9CCE3', '#D4EFDF'
    ];

    // ============ localStorage 缓存 ============
    function saveMenuToLocal(data) {
      localStorage.setItem(STORAGE_KEY_MENU, JSON.stringify(data));
    }

    function loadMenuFromLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_MENU);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveHistoryToLocal() {
      localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
    }

    function loadHistoryFromLocal() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_HISTORY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    // ============ 加载菜单 ============
    async function loadMenu() {
      // 优先读本地缓存（校验结构，无效则回退到 fetch）
      const cached = loadMenuFromLocal();
      const normalized = normalizeMenu(cached);
      if (normalized.length > 0) {
        shopData = normalized;
        history = loadHistoryFromLocal();
        renderShopList();
        renderHistory();
        return;
      }

      // 缓存为空或无效，加载默认菜单
      try {
        const resp = await fetch('menu.json?t=' + Date.now());
        if (!resp.ok) throw new Error('无法加载菜单文件');
        const data = await resp.json();
        shopData = normalizeMenu(data.shops);
        saveMenuToLocal(shopData);
        history = loadHistoryFromLocal();
        renderShopList();
        renderHistory();
      } catch (e) {
        document.getElementById('shopList').innerHTML =
          '<div class="loading" style="color:#ff4757;">菜单加载失败<br>请确保 menu.json 在同目录下，或点击「编辑菜单」手动添加<br>' + e.message + '</div>';
      }
    }

    // ============ 渲染店铺列表 ============
    function renderShopList() {
      const el = document.getElementById('shopList');
      if (shopData.length === 0) {
        el.innerHTML = '<div class="empty">菜单为空，点击「编辑菜单」添加</div>';
        return;
      }

      el.innerHTML = shopData.map((shop, i) => {
        const totalPrice = shop.items.reduce((sum, it) => sum + (it.price || 0), 0);
        const avgPrice = shop.items.length > 0 ? Math.round(totalPrice / shop.items.length) : 0;
        const safeName = escapeHTML(shop.name);
        const safeDataName = safeName.replace(/"/g, '&quot;');
        return `
          <div class="shop-item" onclick="toggleShop(this.querySelector('input').dataset.name)">
            <input type="checkbox" id="shop_${i}" data-name="${safeDataName}" />
            <label for="shop_${i}">${safeName}</label>
            <span class="count">${shop.items.length}道 · 均${avgPrice}元</span>
          </div>
        `;
      }).join('');

      selectAll();
    }

    // ============ 店铺选择 ============
    function toggleShop(name) {
      const idx = selectedShops.indexOf(name);
      if (idx === -1) selectedShops.push(name);
      else selectedShops.splice(idx, 1);
      syncCheckboxes();
      updateMenu();
    }

    function selectAll() {
      selectedShops = shopData.map(s => s.name);
      syncCheckboxes();
      updateMenu();
    }

    function selectNone() {
      selectedShops = [];
      syncCheckboxes();
      updateMenu();
    }

    function syncCheckboxes() {
      document.querySelectorAll('#shopList input[type="checkbox"]').forEach(cb => {
        cb.checked = selectedShops.includes(cb.dataset.name);
      });
    }

    // ============ 更新菜单预览 & 转盘 ============
    function updateMenu() {
      currentItems = [];
      shopData.forEach(shop => {
        if (selectedShops.includes(shop.name)) {
          shop.items.forEach(item => {
            currentItems.push({ dish: item.name, shop: shop.name, price: item.price || 0 });
          });
        }
      });

      const preview = document.getElementById('menuPreview');
      const countEl = document.getElementById('menuCount');

      if (currentItems.length === 0) {
        preview.innerHTML = '<div class="empty">请至少选择一个店铺</div>';
        countEl.textContent = '';
      } else {
        const shopGroups = {};
        currentItems.forEach(item => {
          if (!shopGroups[item.shop]) shopGroups[item.shop] = [];
          shopGroups[item.shop].push(item);
        });
        let html = '';
        let totalEstimate = 0;
        for (const [shop, dishes] of Object.entries(shopGroups)) {
          html += `<div style="margin-bottom:6px;"><b>${escapeHTML(shop)}</b>：`;
          html += dishes.map(d => `<span class="tag">${escapeHTML(d.dish)}<span class="price">￥${d.price}</span></span>`).join('');
          html += '</div>';
          totalEstimate += dishes.reduce((s, d) => s + d.price, 0);
        }
        preview.innerHTML = html;
        countEl.textContent = `共 ${currentItems.length} 道菜 · 约￥${totalEstimate}`;
      }
      buildWheelEntries();
      document.getElementById('spinBtn').disabled = wheelEntries.length === 0;
      drawWheel();
    }

    // ============ 构建转盘条目 & 模式切换 ============
    function buildWheelEntries() {
      if (spinMode === 'shop') {
        wheelEntries = selectedShops.map(name => ({
          label: name, sub: null, price: null, type: 'shop', shop: name, dish: null
        }));
      } else {
        wheelEntries = currentItems.map(it => ({
          label: it.dish, sub: it.shop, price: it.price, type: 'dish', shop: it.shop, dish: it.dish
        }));
      }
    }

    function setSpinMode(mode) {
      if (mode === spinMode || isSpinning) return;
      spinMode = mode;
      document.getElementById('modeDishBtn').classList.toggle('active', mode === 'dish');
      document.getElementById('modeShopBtn').classList.toggle('active', mode === 'shop');
      currentAngle = 0;
      const resultEl = document.getElementById('resultText');
      const priceEl = document.getElementById('resultPrice');
      resultEl.className = 'result-text';
      resultEl.textContent = '';
      priceEl.textContent = '';
      buildWheelEntries();
      document.getElementById('spinBtn').disabled = wheelEntries.length === 0;
      drawWheel();
    }

    // ============ 绘制转盘 ============
    function drawWheel() {
      const size = 840;
      const cx = size / 2, cy = size / 2;
      const radius = size / 2 - 10;
      ctx.clearRect(0, 0, size, size);

      if (wheelEntries.length === 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = '#e0e0e0';
        ctx.fill();
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#aaa';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('请选择店铺', cx, cy);
        return;
      }

      const n = wheelEntries.length;
      const sliceAngle = (Math.PI * 2) / n;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(currentAngle);

      wheelEntries.forEach((entry, i) => {
        const startA = i * sliceAngle - Math.PI / 2;
        const endA = startA + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, startA, endA);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.save();
        ctx.rotate(startA + sliceAngle / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const fontSize = n <= 10 ? 22 : n <= 20 ? 16 : 12;
        const smallFont = Math.max(10, fontSize - 6);

        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = '#333';
        ctx.fillText(entry.label, radius * 0.68, 0);

        if (entry.price != null && n <= 15) {
          ctx.font = `bold ${smallFont}px sans-serif`;
          ctx.fillStyle = '#d63031';
          ctx.fillText(`￥${entry.price}`, radius * 0.52, 0);
        }

        if (entry.sub && n <= 12) {
          ctx.font = `${Math.max(9, smallFont - 2)}px sans-serif`;
          ctx.fillStyle = '#666';
          ctx.fillText(entry.sub, radius * 0.38, 0);
        }

        ctx.restore();
      });

      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 5;
      ctx.stroke();
    }

    // ============ 根据最终角度推算指针命中的扇形 ============
    function getSliceAtPointer(finalAngle) {
      const n = wheelEntries.length;
      const sliceAngle = (Math.PI * 2) / n;
      // 指针固定在顶部(全局 -π/2)，canvas.rotate(θ) 后
      // 全局角度 -π/2 对应本地角度 = -π/2 - θ
      // 扇形 i 的本地范围: [i*s - π/2, (i+1)*s - π/2)
      // 化简得 i = floor(-θ / s)
      const raw = -finalAngle / sliceAngle;
      const idx = ((Math.floor(raw) % n) + n) % n;
      return idx;
    }

    // ============ 转盘动画 ============
    function spin() {
      if (isSpinning || wheelEntries.length === 0) return;
      isSpinning = true;
      const btn = document.getElementById('spinBtn');
      btn.disabled = true;
      btn.textContent = '...';

      const resultEl = document.getElementById('resultText');
      const priceEl = document.getElementById('resultPrice');
      resultEl.className = 'result-text';
      resultEl.textContent = '';
      priceEl.textContent = '';

      const n = wheelEntries.length;
      const minSpins = 8 + Math.floor(Math.random() * 5);
      const randomOffset = Math.random() * Math.PI * 2;

      const startAngle = currentAngle;
      const totalRotation = -(minSpins * Math.PI * 2 + randomOffset);
      const duration = 5000;
      const startTime = performance.now();

      function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        currentAngle = startAngle + totalRotation * easeOutQuint(progress);
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          btn.disabled = false;
          btn.textContent = '开始';

          // 停下后，根据最终角度反算命中的扇形
          const winIdx = getSliceAtPointer(currentAngle);
          const winner = wheelEntries[winIdx];
          if (winner.type === 'shop') {
            resultEl.textContent = `${winner.shop}`;
            priceEl.textContent = '';
          } else {
            resultEl.textContent = `${winner.dish}（${winner.shop}）`;
            priceEl.textContent = `参考价 ￥${winner.price}`;
          }
          resultEl.className = 'result-text show';
          addHistory(winner);
        }
      }
      requestAnimationFrame(animate);
    }

    // ============ 历史记录 ============
    function addHistory(item) {
      history.unshift({ ...item, time: Date.now() });
      if (history.length > 50) history.pop();
      saveHistoryToLocal();
      renderHistory();
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
      const isToday = d.toDateString() === now.toDateString();
      if (isToday) return `今天 ${time}`;
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return `昨天 ${time}`;
      return `${d.getMonth() + 1}/${d.getDate()} ${time}`;
    }

    function renderHistory() {
      const el = document.getElementById('historyList');
      if (history.length === 0) {
        el.innerHTML = '<div class="empty">还没有记录，快来试试吧！</div>';
        return;
      }
      el.innerHTML = history.map((h, i) => {
        const isShop = (h.type || 'dish') === 'shop';
        const badge = isShop
          ? '<span class="hist-badge shop">店铺</span>'
          : '<span class="hist-badge dish">菜品</span>';
        const mainText = isShop ? escapeHTML(h.shop) : escapeHTML(h.dish);
        const priceCol = isShop ? '' : `<span class="history-price">￥${h.price}</span>`;
        const shopCol = isShop ? '' : `<span class="history-shop">${escapeHTML(h.shop)}</span>`;
        return `
        <div class="history-item">
          <span class="history-num">${i + 1}</span>
          <div class="history-info">
            <div class="history-dish">${badge}${mainText}</div>
            <div class="history-time">${formatTime(h.time)}</div>
          </div>
          ${priceCol}
          ${shopCol}
        </div>
      `;
      }).join('');
    }

    function clearHistory() {
      history = [];
      saveHistoryToLocal();
      renderHistory();
    }

    // ============ 菜单编辑器 ============
    let editorData = [];

    function openEditor() {
      editorData = JSON.parse(JSON.stringify(shopData));
      renderEditor();
      document.getElementById('editorModal').classList.add('open');
    }

    function closeEditor() {
      document.getElementById('editorModal').classList.remove('open');
    }

    function renderEditor() {
      const body = document.getElementById('editorBody');
      if (editorData.length === 0) {
        body.innerHTML = '<div class="empty" style="padding:20px;">还没有店铺，点击下方添加</div>';
        return;
      }

      body.innerHTML = editorData.map((shop, si) => {
        const safeShopName = escapeHTML(shop.name).replace(/"/g, '&quot;');
        const isFirst = si === 0;
        const isLast = si === editorData.length - 1;
        return `
        <div class="editor-shop">
          <div class="editor-shop-header">
            <input type="text" value="${safeShopName}" placeholder="店铺名"
              onchange="editorData[${si}].name=this.value" />
            <button class="sort-btn" onclick="editorMoveShop(${si},-1)" ${isFirst ? 'disabled' : ''}>↑</button>
            <button class="sort-btn" onclick="editorMoveShop(${si},1)" ${isLast ? 'disabled' : ''}>↓</button>
            <button class="del-shop-btn" onclick="editorDelShop(${si})">删除店铺</button>
          </div>
          <div class="editor-items">
            ${shop.items.map((item, ii) => {
              const safeItemName = escapeHTML(item.name).replace(/"/g, '&quot;');
              const isItemFirst = ii === 0;
              const isItemLast = ii === shop.items.length - 1;
              return `
              <div class="editor-item">
                <input type="text" value="${safeItemName}" placeholder="菜名"
                  onchange="editorData[${si}].items[${ii}].name=this.value" />
                <input type="number" value="${item.price}" placeholder="价格" min="0"
                  onchange="editorData[${si}].items[${ii}].price=Math.max(0,Number(this.value)||0)" />
                <button class="sort-btn" onclick="editorMoveItem(${si},${ii},-1)" ${isItemFirst ? 'disabled' : ''}>↑</button>
                <button class="sort-btn" onclick="editorMoveItem(${si},${ii},1)" ${isItemLast ? 'disabled' : ''}>↓</button>
                <button class="del-item-btn" onclick="editorDelItem(${si},${ii})">x</button>
              </div>
            `}).join('')}
          </div>
          <button class="add-item-btn" onclick="editorAddItem(${si})">+ 添加菜品</button>
        </div>
      `}).join('');
    }

    function editorAddShop() {
      editorData.push({ name: '新店铺', items: [{ name: '新菜品', price: 0 }] });
      renderEditor();
    }

    function editorDelShop(si) {
      if (!confirm(`确定删除「${editorData[si].name}」吗？`)) return;
      editorData.splice(si, 1);
      renderEditor();
    }

    function editorAddItem(si) {
      editorData[si].items.push({ name: '新菜品', price: 0 });
      renderEditor();
    }

    function editorDelItem(si, ii) {
      editorData[si].items.splice(ii, 1);
      if (editorData[si].items.length === 0) {
        editorData.splice(si, 1);
      }
      renderEditor();
    }

    function editorMoveShop(si, dir) {
      const ti = si + dir;
      if (ti < 0 || ti >= editorData.length) return;
      const tmp = editorData[si];
      editorData[si] = editorData[ti];
      editorData[ti] = tmp;
      renderEditor();
    }

    function editorMoveItem(si, ii, dir) {
      const ti = ii + dir;
      const items = editorData[si].items;
      if (ti < 0 || ti >= items.length) return;
      const tmp = items[ii];
      items[ii] = items[ti];
      items[ti] = tmp;
      renderEditor();
    }

    function editorSave() {
      // 过滤空数据 + 校验去重
      shopData = normalizeMenu(editorData);
      saveMenuToLocal(shopData);
      selectedShops = shopData.map(s => s.name);
      renderShopList();
      closeEditor();
    }

    function editorReset() {
      if (!confirm('将清除自定义菜单并恢复默认，确定吗？')) return;
      localStorage.removeItem(STORAGE_KEY_MENU);
      editorData = [];
      // 重新加载默认菜单
      fetch('menu.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
          shopData = normalizeMenu(data.shops);
          saveMenuToLocal(shopData);
          closeEditor();
          selectedShops = [];
          renderShopList();
        })
        .catch(() => {
          shopData = [];
          closeEditor();
          renderShopList();
        });
    }

    // ============ 初始化 ============
    loadMenu();
    drawWheel();
  </script>
</body>
</html>
